services:
  postgres:
    image: postgres:16-alpine
    container_name: weather-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - weather-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: weather-backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - weather-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: weather-frontend

    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      - backend

    networks:
      - weather-network

volumes:
  postgres_data:

networks:
  weather-network:
    driver: bridge
